<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#E91E8C"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bg)"/>
  <rect width="512" height="512" rx="92" ry="92" fill="url(#glow)"/>
  <!-- Top text: ファミリー -->
  <text x="256" y="98" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="62" font-weight="bold" fill="white" filter="url(#shadow)">ファミリー</text>
  <!-- House body -->
  <g filter="url(#shadow)">
    <!-- Roof -->
    <polygon points="256,168 116,290 396,290" fill="white" opacity="0.95"/>
    <!-- Wall -->
    <rect x="148" y="285" width="216" height="160" rx="8" fill="white" opacity="0.9"/>
    <!-- Door -->
    <rect x="218" y="355" width="76" height="90" rx="8" fill="#9B59B6" opacity="0.6"/>
    <!-- Window left -->
    <rect x="164" y="312" width="54" height="54" rx="6" fill="#E91E8C" opacity="0.5"/>
    <!-- Window right -->
    <rect x="294" y="312" width="54" height="54" rx="6" fill="#E91E8C" opacity="0.5"/>
  </g>
  <!-- Bottom text: カレンダー -->
  <text x="256" y="478" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.88" filter="url(#shadow)">カレンダー</text>
</svg>
